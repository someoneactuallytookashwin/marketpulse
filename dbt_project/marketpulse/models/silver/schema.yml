version: 2

models:
  - name: silver_stock_prices
    description: "Cleaned and validated stock price data"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
          - accepted_values:
              values: ["^SPX", "AAPL", "JPM", "GS", "SPY"]
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: close
        description: "Closing price"
        tests:
          - not_null
      - name: volume
        description: "Trading volume"
        tests:
          - not_null

  - name: silver_macro_indicators
    description: "Cleaned macroeconomic indicator data"
    columns:
      - name: series_id
        description: "FRED series identifier"
        tests:
          - not_null
          - accepted_values:
              values: ["FEDFUNDS", "CPIAUCSL", "UNRATE", "GS10", "GDPC1"]
      - name: date
        description: "Observation date"
        tests:
          - not_null
      - name: value
        description: "Indicator value"
        tests:
          - not_null
